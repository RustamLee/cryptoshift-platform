
spring.application.name=bookstore-service
server.port=8080

# PostgreSQL (Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/bookstore_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
#  Flyway
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=your_very_long_and_secure_secret_key_for_cryptoshift_platform_2024
app.jwt.expiration-ms=3600000

# SendGrid
sendgrid.api.key=${SENDGRID_API_KEY:dummy_key}

#  Kafka
spring.kafka.bootstrap-servers=localhost:9092

#  Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
