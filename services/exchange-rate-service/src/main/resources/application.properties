spring.application.name=exchange-rate-service
server.port=8082

#  Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Binance API URL
binance.api.url=https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT


# Update interval for exchange rates in milliseconds (e.g., 10000 ms = 10 seconds)
app.rate-update-interval=10000
